name: Snowflake DataOps Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-database-objects:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0

      - name: Generate Snowflake Configuration File
        run: |
          mkdir -p ~/.snowflake
          cat << EOF > ~/.snowflake/config.toml
          [connections.bootstrap]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          role = "ACCOUNTADMIN"

          [connections.dev]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          role = "ROLE_FIN_DATA_ENGINEER"
          warehouse = "COMPUTE_WH"
          database = "FIN_DATA_DEV"
          EOF

          chmod 0600 ~/.snowflake/config.toml

      - name: Bootstrap Account Setup
        run: snow sql -f config/account_setup.sql -c bootstrap
      
      - name: Deploy Security and Governance
        run: snow sql -f config/security_and_governance.sql -c bootstrap

      - name: Deploy Bronze Layer DDL
        run: snow sql -f src/bronze/ddl/raw_layer_ddl.sql -c dev

      - name: Deploy ingestion stored procedures
        run: |
          for file in src/bronze/ingest/*.sql; do
            echo "Executing $file..."
            snow sql -f "$file" -c dev
          done

      - name: Deploy General Stored Procedures
        run: snow sql -f orchestration/sp_bronze_orchestration.sql -c dev

      - name: Deploy Orchestration Task
        run: snow sql -f orchestration/ingestion_task.sql -c dev